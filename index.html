<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GS HD APK İndir</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:
  radial-gradient(circle at top,
  #ffcc00 0%,
  #8b0000 35%,
  #050000 80%);
  overflow:hidden;
  color:white;
}

.card{
  width:90%;
  max-width:430px;
  background:rgba(0,0,0,.78);
  border-radius:30px;
  padding:30px;
  text-align:center;
  border:1px solid rgba(255,204,0,.35);
  box-shadow:
  0 0 25px rgba(255,204,0,.25),
  0 0 60px rgba(255,0,0,.15);
  backdrop-filter:blur(10px);
}

.logo{
  width:120px;
  height:120px;
  margin:auto;
  border-radius:30px;
  overflow:hidden;
  border:3px solid #ffcc00;
  box-shadow:0 0 25px rgba(255,204,0,.6);
  animation:glow 2s infinite alternate;
}

.logo img{
  width:100%;
  height:100%;
  object-fit:cover;
}

@keyframes glow{
  from{
    box-shadow:0 0 15px rgba(255,204,0,.4);
  }
  to{
    box-shadow:0 0 35px rgba(255,204,0,1);
  }
}

.badge{
  margin-top:18px;
  display:inline-block;
  padding:8px 18px;
  border-radius:999px;
  background:rgba(255,204,0,.15);
  color:#ffcc00;
  font-size:13px;
  font-weight:bold;
}

h1{
  margin-top:18px;
  font-size:32px;
  color:#ffcc00;
}

.desc{
  margin-top:12px;
  color:#ddd;
  line-height:1.6;
}

.features{
  margin-top:25px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.features div{
  background:rgba(255,255,255,.08);
  padding:14px 8px;
  border-radius:15px;
  font-size:13px;
}

.btn{
  width:100%;
  margin-top:28px;
  border:none;
  padding:18px;
  border-radius:18px;
  font-size:20px;
  font-weight:bold;
  cursor:pointer;
  color:white;
  background:
  linear-gradient(90deg,#ffcc00,#d50000);
  box-shadow:
  0 0 20px rgba(255,204,0,.35);
  transition:.2s;
}

.btn:hover{
  transform:scale(1.02);
}

.btn:active{
  transform:scale(.98);
}

#countdown{
  margin-top:22px;
  font-size:28px;
  font-weight:bold;
  color:#ffcc00;
}

.note{
  margin-top:18px;
  font-size:12px;
  color:#999;
}
</style>
</head>

<body>

<div class="card">

  <div class="logo">
    <img src="Picsart_26-04-24_07-40-35-496.jpg">
  </div>

  <div class="badge">SON SÜRÜM APK</div>

  <h1>GS HD</h1>

  <p class="desc">
     Galatasaraylılar için özel hazırlanmış mobil aplikasyon.
  </p>

  <div class="features">
    <div>📱 Android</div>
    <div>⚡ Hızlı</div>
    <div>🆕 v9</div>
  </div>

  <button class="btn" onclick="startDownload()">
    APK İNDİR
  </button>

  <div id="countdown"></div>

  <div class="note">
    İndirme 10 saniye içinde otomatik başlayacaktır.
  </div>

</div>

<script>

const apkLink =
"https://github.com/GSHDapk/GSHD/releases/download/Spor/GS.HD_v9.apk";

function startDownload(){

  let time = 10;

  const countdown =
  document.getElementById("countdown");

  countdown.innerHTML = time + " saniye";

  const timer = setInterval(()=>{

    time--;

    countdown.innerHTML =
    time + " saniye";

    if(time <= 0){

      clearInterval(timer);

      countdown.innerHTML =
      "İndirme başlıyor...";

      const a =
      document.createElement("a");

      a.href = apkLink;

      a.download = "GS_HD_v9.apk";

      document.body.appendChild(a);

      a.click();

      document.body.removeChild(a);
    }

  },1000);
}

</script>

</body>
</html>
